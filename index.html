<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Image Prompt Studio</title>
    <style>
        :root {
            --bg: #0f1115;
            --card: #1a1d23;
            --text: #e0e0e0;
            --accent: #4285f4;
            --border: #2d333b;
            --input: #24292e;
            --shadow: 0 8px 30px rgba(0,0,0,0.5);
            --header-bg: #161b22;
        }

        [data-theme="Light Studio"] {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #202124;
            --accent: #1a73e8;
            --border: #dadce0;
            --input: #f8f9fa;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --header-bg: #ffffff;
        }

        [data-theme="Noir Mono"] {
            --bg: #000000;
            --card: #111111;
            --text: #ffffff;
            --accent: #ffffff;
            --border: #333333;
            --input: #000000;
            --shadow: 0 0 20px rgba(255,255,255,0.05);
            --header-bg: #000000;
        }

        [data-theme="Warm Analog"] {
            --bg: #1c1917;
            --card: #292524;
            --text: #f5f5f4;
            --accent: #d97706;
            --border: #44403c;
            --input: #1c1917;
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --header-bg: #292524;
        }

        [data-theme="Neon Future"] {
            --bg: #050505;
            --card: #0d0d0d;
            --text: #00ffcc;
            --accent: #ff00ff;
            --border: #ff00ff44;
            --input: #111111;
            --shadow: 0 0 15px rgba(255,0,255,0.2);
            --header-bg: #0d0d0d;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: background 0.2s, color 0.2s, border-color 0.2s; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 24px;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: var(--header-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        h1 { margin: 0; font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; }

        .theme-selector select, button, .tab, .gender-tab {
            background: var(--input);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            font-size: 13px;
        }

        button.primary { background: var(--accent); color: white; border: none; font-weight: 600; }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .tabs, .gender-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab.active, .gender-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .collapsible {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .collapsible-header {
            padding: 12px 16px;
            background: var(--input);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
        }

        .collapsible-content {
            padding: 20px;
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .collapsible.active .collapsible-content { display: grid; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field.full { grid-column: 1 / -1; }
        label { font-size: 11px; opacity: 0.6; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; }

        select, input, textarea {
            width: 100%;
            padding: 10px;
            background: var(--input);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            font-size: 14px;
        }

        .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .chip {
            padding: 5px 12px;
            border-radius: 100px;
            background: var(--input);
            border: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .chip.selected { background: var(--accent); color: white; border-color: var(--accent); }

        .color-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
        .color-pill {
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; box-shadow: 0 0 0 1px var(--border);
        }
        .color-pill.selected { border-color: var(--text); transform: scale(1.1); }

        .output-panel { position: sticky; top: 20px; }
        #generatedPrompt {
            background: #000; color: #d1d5db; font-family: 'Fira Code', monospace;
            font-size: 13px; line-height: 1.6; padding: 20px; border-radius: 8px;
            height: 550px; overflow-y: auto; border: 1px solid var(--border); white-space: pre-wrap;
        }

        .health-bar { background: rgba(255, 193, 7, 0.1); border-left: 4px solid #ffc107; padding: 10px; margin-top: 15px; font-size: 12px; display: none; }
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        .hidden { display: none !important; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .output-panel { position: static; }
        }
    </style>
</head>
<body data-theme="Dark Tech">

<div class="container">
    <header>
        <h1>Google <span style="color:var(--accent)">Studio</span></h1>
        <div class="theme-selector">
            <select id="themeSelect" onchange="changeTheme(this.value)">
                <option>Dark Tech</option>
                <option>Light Studio</option>
                <option>Noir Mono</option>
                <option>Warm Analog</option>
                <option>Neon Future</option>
            </select>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="tabs" id="modeTabs">
                <div class="tab active" data-mode="create" onclick="setMode('create')">Create</div>
                <div class="tab" data-mode="edit" onclick="setMode('edit')">Edit</div>
                <div class="tab" data-mode="fusion" onclick="setMode('fusion')">Fusion</div>
                <div class="tab" data-mode="series" onclick="setMode('series')">Series</div>
                <div class="tab" data-mode="text" onclick="setMode('text')">Text</div>
            </div>

            <div class="gender-tabs">
                <div class="gender-tab active" id="gt_woman" onclick="setGender('woman')">👩 Woman</div>
                <div class="gender-tab" id="gt_man" onclick="setGender('man')">👨 Man</div>
            </div>

            <div id="modeControls" class="collapsible active" style="border-color: var(--accent);">
                <div class="collapsible-header">Mode Controls <span id="modeName">Create</span></div>
                <div class="collapsible-content" id="modeContent"></div>
            </div>

            <div class="collapsible">
                <div class="collapsible-header">Subject & Identity</div>
                <div class="collapsible-content">
                    <div class="field">
                        <label>Age Range 🎂</label>
                        <select id="sub_age">
                            <option value="">- Select -</option>
                            <option>early 20s</option><option>mid 20s</option><option>late 20s</option>
                            <option>early 30s</option><option>mid 30s</option><option>late 30s</option>
                            <option>40s</option><option>50s</option><option>60s</option><option>elderly</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Expression 🎭</label>
                        <select id="sub_expr">
                            <option value="">- Select -</option>
                            <option>calm 😌</option><option>confident 😎</option><option>introspective 🤔</option>
                            <option>mysterious 🤫</option><option>serious 😐</option><option>warm smile 😊</option>
                            <option>intense 👁️</option><option>commanding 🤨</option>
                        </select>
                    </div>
                    <div class="field full">
                        <label>Visual Heritage 🌍</label>
                        <select id="sub_ethnic">
                            <option value="">- Select -</option>
                            <option>East Asian</option><option>Southeast Asian</option><option>South Asian</option>
                            <option>Middle Eastern</option><option>North African</option><option>Black / African diaspora</option>
                            <option>Latino / Hispanic</option><option>White / Caucasian</option><option>Mixed heritage</option>
                        </select>
                    </div>
                    <div class="field full">
                        <label>Override Subject Notes ✏️</label>
                        <textarea id="sub_custom" placeholder="Specific unique traits..."></textarea>
                    </div>
                </div>
            </div>

            <div class="collapsible">
                <div class="collapsible-header">Hair & Face Details</div>
                <div class="collapsible-content">
                    <div class="field full">
                        <label>Hair Color Palette 🎨</label>
                        <div class="color-group" id="hair_color_pills">
                            </div>
                    </div>
                    
                    <div class="field gender-woman-field">
                        <label>Style (Woman) 💇‍♀️</label>
                        <select id="hair_style_woman">
                            <option value="">- Select -</option>
                            <option>loose and down</option><option>sleek high ponytail</option><option>messy bun</option>
                            <option>pixie cut</option><option>bob cut with bangs</option><option>long beachy waves</option>
                            <option>braided crown</option><option>tight coily curls</option>
                        </select>
                    </div>

                    <div class="field gender-man-field hidden">
                        <label>Style (Man) 💇‍♂️</label>
                        <select id="hair_style_man">
                            <option value="">- Select -</option>
                            <option>textured crew cut</option><option>classic side part</option><option>slicked back</option>
                            <option>buzz cut</option><option>undercut with fade</option><option>messy fringe</option>
                            <option>man bun</option><option>long natural hair</option>
                        </select>
                    </div>
                    <div class="field gender-man-field hidden">
                        <label>Facial Hair 🧔</label>
                        <select id="sub_facial_hair">
                            <option value="">- Select -</option>
                            <option>clean shaven</option><option>light stubble</option><option>groomed short beard</option>
                            <option>full thick beard</option><option>defined mustache</option><option>goatee</option>
                        </select>
                    </div>

                    <div class="field full">
                        <label>Eye Color</label>
                        <div class="color-group" id="eye_color_pills">
                            <div class="color-pill" style="background:#634e34" data-val="dark brown" title="Dark Brown"></div>
                            <div class="color-pill" style="background:#8b4513" data-val="hazel" title="Hazel"></div>
                            <div class="color-pill" style="background:#497665" data-val="emerald green" title="Green"></div>
                            <div class="color-pill" style="background:#527188" data-val="icy blue" title="Blue"></div>
                            <div class="color-pill" style="background:#8e7618" data-val="amber" title="Amber"></div>
                            <div class="color-pill" style="background:#808080" data-val="steel gray" title="Gray"></div>
                            <div class="color-pill" style="background:#000" data-val="pitch black" title="Black"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="collapsible">
                <div class="collapsible-header">Clothing & Footwear</div>
                <div class="collapsible-content">
                    <div class="field">
                        <label>Style Base 🧥</label>
                        <select id="sub_outfit_style"><option value="">- Select -</option><option>minimalist</option><option>streetwear</option><option>luxury fashion</option><option>cyberpunk</option><option>vintage</option><option>noir</option><option>business professional</option></select>
                    </div>

                    <div class="field gender-woman-field">
                        <label>Footwear (Woman) 👠</label>
                        <select id="shoes_woman">
                            <option value="">- Select -</option>
                            <option>elegant high heels 👠</option><option>sleek leather boots 👢</option>
                            <option>strappy sandals 🩴</option><option>designer sneakers 👟</option>
                            <option>ballet flats 🩰</option><option>stiletto pumps 👠</option>
                        </select>
                    </div>

                    <div class="field gender-man-field hidden">
                        <label>Footwear (Man) 👞</label>
                        <select id="shoes_man">
                            <option value="">- Select -</option>
                            <option>formal oxford shoes 👞</option><option>rugged combat boots 🥾</option>
                            <option>chelsea boots 👢</option><option>high-top sneakers 👟</option>
                            <option>loafers 👞</option><option>athletic trainers 👟</option>
                        </select>
                    </div>

                    <div class="field full">
                        <label>Clothing Palette 🌈</label>
                        <div class="color-group" id="outfit_color_pills">
                            </div>
                    </div>

                    <div class="field full">
                        <label>Common Outfit Pieces</label>
                        <div class="chip-group" id="outfit_chips">
                            <div class="chip" data-val="trench coat">🧥 trench coat</div>
                            <div class="chip" data-val="leather jacket">🧥 leather jacket</div>
                            <div class="chip" data-val="oversized sweater">🧶 sweater</div>
                            <div class="chip" data-val="blazer">🧥 blazer</div>
                            <div class="chip" data-val="trousers">👖 trousers</div>
                            <div class="chip" data-val="jeans">👖 jeans</div>
                            <div class="chip" data-val="sunglasses">🕶️ sunglasses</div>
                        </div>
                    </div>
                    <div class="field full"><label>Specific Outfit Notes</label><textarea id="outfit_custom"></textarea></div>
                </div>
            </div>

            <div class="collapsible">
                <div class="collapsible-header">Environment & Weather</div>
                <div class="collapsible-content">
                    <div class="field">
                        <label>Location 📍</label>
                        <select id="env_loc"><option value="">- Select -</option><option>city street 🏙️</option><option>rooftop 🌇</option><option>cafe interior ☕</option><option>subway platform 🚇</option><option>forest 🌲</option><option>desert 🏜️</option><option>minimalist studio 📸</option></select>
                    </div>
                    <div class="field">
                        <label>Time ⏰</label>
                        <select id="env_time"><option value="">- Select -</option><option>dawn 🌅</option><option>morning ☀️</option><option>golden hour 🌇</option><option>blue hour 🌃</option><option>night 🌙</option></select>
                    </div>
                    <div class="field full">
                        <label>Weather ☁️</label>
                        <select id="env_weather"><option value="">- Select -</option><option>clear skies ☀️</option><option>overcast ☁️</option><option>foggy 🌫️</option><option>rainy 🌧️</option><option>snowing ❄️</option></select>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <aside class="output-panel">
        <div class="card">
            <label>Studio Output</label>
            <div id="generatedPrompt">Configure settings and click "Generate"...</div>
            <div id="healthBar" class="health-bar"></div>
            <div class="actions-grid">
                <button class="primary" style="grid-column: span 2;" onclick="generate()">Generate Prompt</button>
                <button onclick="copyPrompt()">Copy</button>
                <button onclick="resetForm()">Clear</button>
                <button onclick="downloadPrompt()">Download</button>
            </div>
        </div>
    </aside>
</div>

<script>
    const hairColors = [
        {n:'Black', c:'#000'}, {n:'Dark Brown', c:'#3d2314'}, {n:'Chestnut', c:'#5a3825'},
        {n:'Auburn', c:'#71231d'}, {n:'Copper Red', c:'#b87333'}, {n:'Golden Blonde', c:'#e2bc74'},
        {n:'Platinum', c:'#e5e4e2'}, {n:'Silver', c:'#c0c0c0'}, {n:'White', c:'#fff'},
        {n:'Burgundy', c:'#800020'}, {n:'Midnight Blue', c:'#191970'}
    ];

    const outfitColors = [
        {n:'Jet Black', c:'#0a0a0a'}, {n:'Charcoal', c:'#333'}, {n:'Slate Gray', c:'#708090'},
        {n:'Pure White', c:'#f5f5f5'}, {n:'Navy Blue', c:'#000080'}, {n:'Royal Crimson', c:'#dc143c'},
        {n:'Emerald Green', c:'#50c878'}, {n:'Camel', c:'#c19a6b'}, {n:'Dusty Rose', c:'#b48395'},
        {n:'Mustard Yellow', c:'#e1ad01'}, {n:'Cyber Neon Purple', c:'#bc13fe'}
    ];

    const modeConfigs = {
        create: { title: "Create Mode", fields: `<div class="field full"><label>Purpose</label><select id="mode_purpose"><option>Cinematic Still</option><option>Editorial Portrait</option><option>Product Mockup</option></select></div>` },
        edit: { title: "Edit Mode", fields: `<div class="field full"><label>Edit Instructions</label><textarea id="mode_edit_inst" placeholder="e.g., Change the shoes to red sneakers..."></textarea></div>` },
        fusion: { title: "Fusion Mode", fields: `<div class="field full"><label>Fusion Goal</label><textarea id="mode_fuse_inst" placeholder="Combine A and B..."></textarea></div>` },
        series: { title: "Series Mode", fields: `<div class="field full"><label>Continuity Notes</label><textarea id="mode_series_inst" placeholder="Keep character features consistent..."></textarea></div>` },
        text: { title: "Text Mode", fields: `<div class="field full"><label>Exact Text</label><input type="text" id="mode_text_val" placeholder="TITLE"></div>` }
    };

    let currentMode = 'create';
    let currentGender = 'woman';

    function init() {
        populatePills('hair_color_pills', hairColors);
        populatePills('outfit_color_pills', outfitColors);
        setMode('create');
        
        document.querySelectorAll('.collapsible-header').forEach(header => {
            header.addEventListener('click', () => header.parentElement.classList.toggle('active'));
        });

        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => chip.classList.toggle('selected'));
        });
    }

    function populatePills(containerId, list) {
        const container = document.getElementById(containerId);
        list.forEach(item => {
            const pill = document.createElement('div');
            pill.className = 'color-pill';
            pill.style.background = item.c;
            pill.title = item.n;
            pill.dataset.val = item.n;
            pill.onclick = () => {
                container.querySelectorAll('.color-pill').forEach(p => p.classList.remove('selected'));
                pill.classList.add('selected');
            };
            container.appendChild(pill);
        });
    }

    function setGender(gender) {
        currentGender = gender;
        document.querySelectorAll('.gender-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`gt_${gender}`).classList.add('active');

        document.querySelectorAll('.gender-woman-field').forEach(el => el.classList.toggle('hidden', gender !== 'woman'));
        document.querySelectorAll('.gender-man-field').forEach(el => el.classList.toggle('hidden', gender !== 'man'));
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
        document.getElementById('modeName').innerText = modeConfigs[mode].title;
        document.getElementById('modeContent').innerHTML = modeConfigs[mode].fields;
    }

    function generate() {
        const val = (id) => document.getElementById(id)?.value || '';
        const color = (parentId) => document.querySelector(`#${parentId} .color-pill.selected`)?.dataset.val || '';
        const chips = (id) => Array.from(document.querySelectorAll(`#${id} .chip.selected`)).map(c => c.dataset.val).join(', ');

        let p = `Create an image for this purpose: ${val('mode_purpose') || 'High-fidelity visual'}.\n\n`;

        if (currentMode === 'edit') p = `Edit the uploaded image.\nInstructions: ${val('mode_edit_inst')}\n\n`;
        if (currentMode === 'text') p = `Text requirement: Render exactly "${val('mode_text_val')}". No extra text.\n\n`;

        // Subject
        let hStyle = currentGender === 'woman' ? val('hair_style_woman') : val('hair_style_man');
        let hCol = color('hair_color_pills');
        let eCol = color('eye_color_pills');

        let subStr = `Subject:\nA ${currentGender} in their ${val('sub_age') || 'adult years'}`;
        if (val('sub_ethnic')) subStr += ` of ${val('sub_ethnic')} visual heritage`;
        if (val('sub_expr')) subStr += ` with a ${val('sub_expr').split(' ')[0]} expression`;
        if (hCol || hStyle) subStr += `, featuring ${hCol} ${hStyle} hair`;
        if (eCol) subStr += ` and striking ${eCol} eyes`;
        if (currentGender === 'man' && val('sub_facial_hair')) subStr += `. Facial hair: ${val('sub_facial_hair')}`;
        
        p += subStr + ".\n";
        if (val('sub_custom')) p += `${val('sub_custom')}\n`;

        // Clothing
        let shoes = currentGender === 'woman' ? val('shoes_woman') : val('shoes_man');
        let outfitCol = color('outfit_color_pills');
        let outfitParts = chips('outfit_chips');

        if (outfitCol || outfitParts || shoes) {
            p += `\nStyling:\n${val('sub_outfit_style')} aesthetic. Wearing ${outfitParts} in a ${outfitCol} color palette. Footwear: ${shoes}.\n`;
        }
        if (val('outfit_custom')) p += `${val('outfit_custom')}\n`;

        p += `\nEnvironment:\n${val('env_loc')} at ${val('env_time')} during ${val('env_weather')}.\n\n`;
        p += `Composition:\nEnsure visual hierarchy and realistic art direction. No text, no logos, natural hands.`;

        document.getElementById('generatedPrompt').textContent = p;
        runHealthCheck();
    }

    function runHealthCheck() {
        const hb = document.getElementById('healthBar');
        let warns = [];
        if (!document.getElementById('sub_age').value) warns.push("Age range not specified.");
        if (!document.getElementById('env_loc').value) warns.push("Location is empty.");
        if (warns.length > 0) {
            hb.style.display = "block";
            hb.innerHTML = "<strong>Quality Check:</strong><br>• " + warns.join('<br>• ');
        } else {
            hb.style.display = "none";
        }
    }

    function changeTheme(theme) { document.body.setAttribute('data-theme', theme); }
    function copyPrompt() { navigator.clipboard.writeText(document.getElementById('generatedPrompt').textContent); alert("Prompt copied!"); }
    function resetForm() { window.location.reload(); }

    init();
</script>
</body>
</html>
