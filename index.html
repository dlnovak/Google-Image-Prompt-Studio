<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Image Prompt Studio</title>
    <style>
        :root {
            --bg: #0f1115;
            --card: #1a1d23;
            --text: #e0e0e0;
            --accent: #4285f4;
            --border: #2d333b;
            --input: #24292e;
            --shadow: 0 8px 30px rgba(0,0,0,0.5);
            --header-bg: #161b22;
        }

        [data-theme="Light Studio"] {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #202124;
            --accent: #1a73e8;
            --border: #dadce0;
            --input: #f8f9fa;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --header-bg: #ffffff;
        }

        [data-theme="Noir Mono"] {
            --bg: #000000;
            --card: #111111;
            --text: #ffffff;
            --accent: #ffffff;
            --border: #333333;
            --input: #000000;
            --shadow: 0 0 20px rgba(255,255,255,0.05);
            --header-bg: #000000;
        }

        [data-theme="Warm Analog"] {
            --bg: #1c1917;
            --card: #292524;
            --text: #f5f5f4;
            --accent: #d97706;
            --border: #44403c;
            --input: #1c1917;
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --header-bg: #292524;
        }

        [data-theme="Neon Future"] {
            --bg: #050505;
            --card: #0d0d0d;
            --text: #00ffcc;
            --accent: #ff00ff;
            --border: #ff00ff44;
            --input: #111111;
            --shadow: 0 0 15px rgba(255,0,255,0.2);
            --header-bg: #0d0d0d;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.2s, color 0.2s; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 24px;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: var(--header-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 8px 16px; border-radius: 8px; cursor: pointer; background: var(--input);
            border: 1px solid var(--border); font-size: 13px;
        }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .collapsible { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        .collapsible-header {
            padding: 12px 16px; background: var(--input); cursor: pointer;
            display: flex; justify-content: space-between; font-weight: 600; font-size: 14px;
        }
        .collapsible-content { padding: 20px; display: none; grid-template-columns: 1fr 1fr; gap: 15px; }
        .collapsible.active .collapsible-content { display: grid; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field.full { grid-column: 1 / -1; }
        label { font-size: 11px; opacity: 0.6; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        select, input, textarea {
            width: 100%; padding: 10px; background: var(--input); border: 1px solid var(--border);
            color: var(--text); border-radius: 6px; font-size: 14px;
        }

        .color-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .color-pill {
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; box-shadow: 0 0 0 1px var(--border);
        }
        .color-pill.selected { border-color: var(--text); transform: scale(1.2); }

        .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip {
            padding: 5px 12px; border-radius: 100px; background: var(--input);
            border: 1px solid var(--border); font-size: 12px; cursor: pointer;
        }
        .chip.selected { background: var(--accent); color: white; }

        .gender-toggle {
            display: flex; background: var(--input); border-radius: 8px; padding: 4px; gap: 4px; margin-bottom: 15px;
        }
        .gender-btn {
            flex: 1; padding: 8px; border-radius: 6px; cursor: pointer; text-align: center;
            font-weight: 600; font-size: 13px; border: none; background: transparent; color: var(--text);
        }
        .gender-btn.active { background: var(--accent); color: white; }

        #generatedPrompt {
            background: #000; color: #d1d5db; font-family: monospace; font-size: 13px;
            padding: 20px; border-radius: 8px; height: 500px; overflow-y: auto; white-space: pre-wrap;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Google <span style="color:var(--accent)">Studio</span></h1>
        <select id="themeSelect" onchange="changeTheme(this.value)">
            <option>Dark Tech</option><option>Light Studio</option><option>Noir Mono</option><option>Warm Analog</option><option>Neon Future</option>
        </select>
    </header>

    <main>
        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="setMode('create')">Create</div>
                <div class="tab" onclick="setMode('edit')">Edit</div>
                <div class="tab" onclick="setMode('text')">Text</div>
            </div>

            <div class="gender-toggle">
                <button class="gender-btn active" id="btnWoman" onclick="setGender('woman')">👩 Woman</button>
                <button class="gender-btn" id="btnMan" onclick="setGender('man')">👨 Man</button>
            </div>

            <div class="collapsible active">
                <div class="collapsible-header">Subject & Identity</div>
                <div class="collapsible-content">
                    <div class="field">
                        <label>Age 🎂</label>
                        <select id="sub_age">
                            <option value="">- Select -</option>
                            <option>early 20s</option><option>30s</option><option>40s</option><option>50s</option><option>elderly</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Expression 🎭</label>
                        <select id="sub_expr">
                            <option value="">- Select -</option>
                            <option>calm 😌</option><option>confident 😎</option><option>serious 😐</option><option>joyful 😊</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="collapsible">
                <div class="collapsible-header">Hair & Grooming</div>
                <div class="collapsible-content">
                    <div class="field full">
                        <label>Hair Color 🎨</label>
                        <div class="color-group" id="hairColors">
                            </div>
                    </div>
                    <div class="field gender-woman">
                        <label>Style (Woman) 💇‍♀️</label>
                        <select id="hair_woman">
                            <option value="">- Select -</option>
                            <option>long flowing waves</option><option>sleek high ponytail</option><option>messy bun</option><option>bob cut</option><option>pixie cut</option>
                        </select>
                    </div>
                    <div class="field gender-man hidden">
                        <label>Style (Man) 💇‍♂️</label>
                        <select id="hair_man">
                            <option value="">- Select -</option>
                            <option>classic side part</option><option>textured pompadour</option><option>buzz cut</option><option>taper fade</option><option>man bun</option>
                        </select>
                    </div>
                    <div class="field gender-man hidden">
                        <label>Facial Hair 🧔</label>
                        <select id="sub_beard">
                            <option value="">- Select -</option>
                            <option>clean shaven</option><option>stubble</option><option>full beard</option><option>groomed mustache</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="collapsible">
                <div class="collapsible-header">Clothing & Style</div>
                <div class="collapsible-content">
                    <div class="field full">
                        <label>Theme Palette 🌈</label>
                        <div class="color-group" id="themeColors"></div>
                    </div>
                    <div class="field gender-woman">
                        <label>Apparel 👗</label>
                        <select id="wear_woman">
                            <option value="">- Select -</option>
                            <option>evening gown 👗</option><option>oversized blazer & trousers 🧥</option><option>summer sundress 👗</option><option>leather jacket & skinny jeans 🧥</option>
                        </select>
                    </div>
                    <div class="field gender-man hidden">
                        <label>Apparel 👔</label>
                        <select id="wear_man">
                            <option value="">- Select -</option>
                            <option>tailored three-piece suit 👔</option><option>denim jacket & chinos 🧥</option><option>hoodie & joggers 👟</option><option>turtleneck & overcoat 🧥</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Shoes 👟</label>
                        <select id="sub_shoes">
                            <option value="">- Select -</option>
                            <option>sleek boots 👢</option><option>designer sneakers 👟</option><option>formal dress shoes 👞</option><option>minimalist sandals 🩴</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="collapsible">
                <div class="collapsible-header">Environment & Lighting</div>
                <div class="collapsible-content">
                    <div class="field"><label>Location 📍</label><select id="env_loc"><option>city street 🏙️</option><option>minimalist studio 📸</option><option>lush forest 🌲</option></select></div>
                    <div class="field"><label>Light 💡</label><select id="lit_type"><option>golden hour 🌇</option><option>soft studio light 💡</option><option>neon glow 🌈</option></select></div>
                </div>
            </div>
        </div>
    </main>

    <aside>
        <div class="card" style="position: sticky; top: 20px;">
            <label>Generated Prompt</label>
            <div id="generatedPrompt">Press "Generate"...</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <button class="primary" style="grid-column: span 2;" onclick="generate()">Generate Prompt</button>
                <button onclick="copyText()">Copy</button>
                <button onclick="reset()">Reset</button>
            </div>
        </div>
    </aside>
</div>

<script>
    let currentGender = 'woman';
    const hairColors = [
        {n:'Black', c:'#000'}, {n:'Dark Brown', c:'#3d2314'}, {n:'Light Brown', c:'#7a5c3d'},
        {n:'Platinum', c:'#e5e4e2'}, {n:'Golden Blonde', c:'#e2bc74'}, {n:'Auburn', c:'#71231d'},
        {n:'Copper', c:'#b87333'}, {n:'Silver', c:'#c0c0c0'}, {n:'Burgundy', c:'#800020'},
        {n:'Midnight Blue', c:'#191970'}, {n:'Forest Green', c:'#228b22'}
    ];
    const themeColors = [
        {n:'Neutral', c:'#d2b48c'}, {n:'Crimson', c:'#dc143c'}, {n:'Emerald', c:'#50c878'},
        {n:'Royal Blue', c:'#4169e1'}, {n:'Lavender', c:'#e6e6fa'}, {n:'Amber', c:'#ffbf00'},
        {n:'Slate', c:'#708090'}, {n:'Monochrome', c:'#333'}
    ];

    function initColors(id, list) {
        const container = document.getElementById(id);
        list.forEach(item => {
            const pill = document.createElement('div');
            pill.className = 'color-pill';
            pill.style.background = item.c;
            pill.title = item.n;
            pill.dataset.val = item.n;
            pill.onclick = () => {
                container.querySelectorAll('.color-pill').forEach(p => p.classList.remove('selected'));
                pill.classList.add('selected');
            };
            container.appendChild(pill);
        });
    }

    function setGender(g) {
        currentGender = g;
        document.getElementById('btnWoman').classList.toggle('active', g === 'woman');
        document.getElementById('btnMan').classList.toggle('active', g === 'man');
        document.querySelectorAll('.gender-woman').forEach(el => el.classList.toggle('hidden', g !== 'woman'));
        document.querySelectorAll('.gender-man').forEach(el => el.classList.toggle('hidden', g !== 'man'));
    }

    function generate() {
        const get = id => document.getElementById(id).value;
        const color = id => document.querySelector(`#${id} .selected`)?.dataset.val || '';
        
        let p = `Create an image of a ${currentGender} in their ${get('sub_age') || 'adult years'}.\n\n`;
        
        let hair = currentGender === 'woman' ? get('hair_woman') : get('hair_man');
        let hCol = color('hairColors');
        p += `Subject Details:\nA ${currentGender} with ${hCol} ${hair}. `;
        if (currentGender === 'man' && get('sub_beard')) p += `Facial hair: ${get('sub_beard')}. `;
        p += `Expression: ${get('sub_expr')}.\n\n`;

        let apparel = currentGender === 'woman' ? get('wear_woman') : get('wear_man');
        p += `Style:\nWearing ${apparel} in a ${color('themeColors')} color palette. Footwear: ${get('sub_shoes')}.\n\n`;
        
        p += `Setting:\nLocation: ${get('env_loc')}. Lighting: ${get('lit_type')}.\n\n`;
        p += `Constraints:\nNo text, no logos, natural anatomy, high-fidelity photorealism.`;

        document.getElementById('generatedPrompt').textContent = p;
    }

    document.querySelectorAll('.collapsible-header').forEach(h => {
        h.onclick = () => h.parentElement.classList.toggle('active');
    });

    function changeTheme(t) { document.body.setAttribute('data-theme', t); }
    function copyText() { navigator.clipboard.writeText(document.getElementById('generatedPrompt').textContent); alert('Copied!'); }
    function reset() { location.reload(); }

    initColors('hairColors', hairColors);
    initColors('themeColors', themeColors);
</script>
</body>
</html>
